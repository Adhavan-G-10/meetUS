version: '3.8'

services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - NODE_ENV=production
      - CLIENT_URL=http://localhost:5173
    restart: unless-stopped
    networks:
      - meetus-network

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      - VITE_SERVER_URL=http://localhost:3000
    restart: unless-stopped
    networks:
      - meetus-network
    depends_on:
      - server

networks:
  meetus-network:
    driver: bridge
